<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpsGrid AI — Empresas</title>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --amber: #f59e0b; --text: #e2e8f0; --muted: #64748b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      height: 56px; display: flex; align-items: center; padding: 0 28px;
    }
    .logo { font-weight: 700; font-size: 17px; }
    .logo em { color: var(--amber); font-style: normal; }
    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 24px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .list { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 12px; }
    .item {
      display: block; text-decoration: none;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 22px;
      color: var(--text); transition: border-color .2s;
    }
    .item:hover { border-color: var(--amber); }
    .item-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .item-id { font-size: 12px; color: var(--muted); font-family: monospace; }
  </style>
</head>
<body>
<nav><div class="logo">📊 Ops<em>Grid</em> AI</div></nav>
<main>
  <h1>Seleccioná una empresa</h1>
  <p>Tenés {{ clientes|length }} empresa{{ 's' if clientes|length != 1 }} configurada{{ 's' if clientes|length != 1 }}.</p>
  <div class="list">
    {% for c in clientes %}
    <a class="item" href="/{{ c }}">
      <div class="item-name">{{ c.replace('_', ' ').title() }}</div>
      <div class="item-id">{{ c }}</div>
    </a>
    {% endfor %}
  </div>
</main>
</body>
</html>
